# Local development dependencies. Not for production.
# Production self-host uses infra/docker-compose/self-host/docker-compose.yml.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: xpntl
      POSTGRES_USER: xpntl
      POSTGRES_PASSWORD: xpntl
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xpntl -d xpntl"]
      interval: 5s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000
    volumes:
      - azuritedata:/data
    ports:
      - "10000:10000"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI for inspecting sent mail

  samltest:
    # Test SAML IdP so SSO is exercisable from day one.
    # SP entity id + ACS URL point at the local api on :4000.
    image: kristophjunge/test-saml-idp
    environment:
      SIMPLESAMLPHP_SP_ENTITY_ID: http://localhost:4000
      SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE: http://localhost:4000/auth/saml/acs
    ports:
      - "8090:8080"

volumes:
  pgdata:
  azuritedata:
